name: Playwright API Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  api-tests:
    name: API Automation Tests
    runs-on: ubuntu-latest
    env:
      CI: true
      ENV: ${{ github.event.inputs.environment || 'qa' }}
      BASE_URL: https://jsonplaceholder.typicode.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run API tests
        run: npm run test:api

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JSON test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-results
          path: test-results/
          retention-days: 14
